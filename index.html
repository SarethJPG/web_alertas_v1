<!DOCTYPE html>
<html lang="es">
<head>
    <!-- Metadatos esenciales y responsividad -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alertas Sísmicas – Venta e instalación de Alertas Sísmicas</title>
    
    <!-- Enlace al archivo CSS global -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ==========================================
         SECCIÓN: BARRA DE NAVEGACIÓN (NAVBAR)
         ========================================== -->
    <header class="navbar" id="navbar">
        <div class="nav-container">
            
            <!-- 1. Logo (Izquierda) -->
            <a href="#" class="nav-logo">
                <img src="imgs/logo.png" alt="Logo Alertas Sísmicas">
            </a>

            <!-- 2. Título Central -->
            <div class="nav-title">
                <p>Sistemas de Alerta Sísmica y Servicios de Protección Civil SA de CV.</p>
            </div>

            <!-- Botón de menú para móviles (Hamburguesa) -->
            <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Abrir menú">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>

            <!-- 3. Enlaces / Pestañas (Derecha) -->
            <nav class="nav-links" id="nav-links">
                <a href="#inicio" class="nav-item">Inicio</a>
                <a href="#equipos" class="nav-item">Equipos</a>
                <a href="#cotiza" class="nav-item">¡Cotiza ahora!</a>
            </nav>

        </div>
    </header>
    <!-- ================= FIN NAVBAR ================= -->

    <!-- Aquí irá el resto del contenido del sitio (Main, Secciones, Footer) -->
    <main>
        <!-- Contenido temporal para poder probar el scroll de la navbar -->
        <section id="inicio" style="height: 100vh; padding-top: 100px;">
            <h1>Bienvenido (Contenido de prueba para scroll)</h1>
        </section>
        <section id="equipos" style="height: 100vh; background: #f4f4f4;">
            <h2>Sección Equipos</h2>
        </section>
        <section id="cotiza" style="height: 100vh;">
            <h2>Sección Cotiza</h2>
        </section>
    </main>

    <!-- Enlace al archivo JS principal -->
    <script src="main.js"></script>
</body>
</html>
